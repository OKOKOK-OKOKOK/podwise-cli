project_name: podwise

before:
  hooks:
    - go mod tidy
    - sh -c 'mkdir -p /tmp/_podwise_build/podwise-skills && cp -r skills/. /tmp/_podwise_build/podwise-skills/ && tar czf podwise-skills.tar.gz -C /tmp/_podwise_build podwise-skills && rm -rf /tmp/_podwise_build'

builds:
  - binary: podwise
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    rlcp: true
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  extra_files:
    - glob: podwise-skills.tar.gz

release:
  disable: true
